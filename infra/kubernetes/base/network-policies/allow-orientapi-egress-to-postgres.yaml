apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orientapi-egress-to-postgres
  namespace: orientapi
  labels:
    app.kubernetes.io/part-of: orientops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orientapi
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - port: 5432
          protocol: TCP
