# Allow OrientAPI pods to reach PostgreSQL running in Docker on the app node host (port 5432).
# PostgreSQL runs in Docker with -p 5432:5432. Docker DNAT rewrites the destination to the
# container's bridge IP (172.17.0.x) before kube-router sees the FORWARD chain, so we must
# allow both the VPC subnet (10.0.0.0/16) and the Docker bridge subnet (172.17.0.0/16).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orientapi-egress-to-postgres
  namespace: orientapi
  labels:
    app.kubernetes.io/part-of: orientops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orientapi
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
        - ipBlock:
            cidr: 172.17.0.0/16
      ports:
        - port: 5432
          protocol: TCP
