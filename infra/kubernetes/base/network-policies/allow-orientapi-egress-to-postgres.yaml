# Allow OrientAPI pods to reach PostgreSQL running in Docker on the app node host (port 5432).
# PostgreSQL is no longer a k8s pod — it runs in Docker on the host, reachable via the VPC subnet.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orientapi-egress-to-postgres
  namespace: orientapi
  labels:
    app.kubernetes.io/part-of: orientops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orientapi
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: 5432
          protocol: TCP
