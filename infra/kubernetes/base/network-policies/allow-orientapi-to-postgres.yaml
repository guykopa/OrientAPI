apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orientapi-to-postgres
  namespace: orientapi
  labels:
    app.kubernetes.io/part-of: orientops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: orientapi
      ports:
        - port: 5432
          protocol: TCP
