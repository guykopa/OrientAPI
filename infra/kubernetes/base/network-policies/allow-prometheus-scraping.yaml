# Allow external Prometheus (monitoring node, via NodePort 30090) to scrape OrientAPI metrics.
# Prometheus is no longer in-cluster — traffic arrives from the VPC subnet.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: orientapi
  labels:
    app.kubernetes.io/part-of: orientops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orientapi
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: 8000
          protocol: TCP
