# Allow Prometheus (in observability namespace) to scrape OrientAPI metrics on port 8000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: orientapi
  labels:
    app.kubernetes.io/part-of: orientops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orientapi
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 8000
          protocol: TCP
