# Deny all ingress and egress by default in the orientapi namespace.
# Explicit allow rules below whitelist only the strictly necessary traffic.
# Note: requires a CNI that enforces NetworkPolicy (Cilium recommended with k3s).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: orientapi
  labels:
    app.kubernetes.io/part-of: orientops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
