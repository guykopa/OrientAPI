# Helm values for kube-prometheus-stack
# Tuned for a t3.small node (2 GiB total RAM — see memory budget in CLAUDE.md).
# k3s exposes scheduler/controller-manager on non-standard paths; disable their scraping.

defaultRules:
  rules:
    etcd: false
    kubeScheduler: false

kubeScheduler:
  enabled: false

kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

# Disable admission webhook — not needed for single-node demo and causes a deadlock
# on k3s where the operator cannot become Ready before the webhook it serves is registered.
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false

alertmanager:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "400Mi"
        cpu: "500m"
    # Scrape OrientAPI pods via annotation-based discovery
    additionalScrapeConfigs:
      - job_name: orientapi
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [orientapi]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: orientapi
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "${1}:8000"

grafana:
  adminPassword: "orientops-demo"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "150Mi"
      cpu: "200m"
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: observability
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true

nodeExporter:
  resources:
    requests:
      memory: "32Mi"
      cpu: "20m"
    limits:
      memory: "64Mi"
      cpu: "100m"

kubeStateMetrics:
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"
