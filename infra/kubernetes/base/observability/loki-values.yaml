# Helm values for Loki (grafana/loki chart, single-binary mode)
# Filesystem storage — no S3 needed for demo. Acceptable for a single-node POC.

deploymentMode: SingleBinary

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  auth_enabled: false
  limits_config:
    retention_period: 168h  # 7 days

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "150Mi"
      cpu: "200m"
  persistence:
    enabled: true
    size: 5Gi

# Ship logs from every node with Promtail
promtail:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "20m"
    limits:
      memory: "64Mi"
      cpu: "100m"
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

# Disable components not needed for single-node demo
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
