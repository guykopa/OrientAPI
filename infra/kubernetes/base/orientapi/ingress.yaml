apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orientapi
  namespace: orientapi
  labels:
    app.kubernetes.io/name: orientapi
    app.kubernetes.io/part-of: orientops
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.orientops.demo
      secretName: orientapi-tls
  rules:
    - host: api.orientops.demo
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orientapi
                port:
                  number: 80
